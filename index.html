    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.zIndex = '999999';
        div.style.padding = '20px';
        div.style.fontFamily = 'monospace';
        div.style.overflow = 'auto';
        var stack = e.error && e.error.stack ? e.error.stack : 'No stack trace';
        div.innerHTML = '<h1>JS Error: ' + e.message + '</h1><pre>' + stack + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.background = 'darkred';
        div.style.color = 'white';
        div.style.zIndex = '999999';
        div.style.padding = '20px';
        div.style.fontFamily = 'monospace';
        div.style.overflow = 'auto';
        var reason = e.reason && e.reason.stack ? e.reason.stack : JSON.stringify(e.reason);
        div.innerHTML = '<h1>Promise Rejection: ' + reason + '</h1>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
